name: Update AI Tool Scores

on:
  schedule:
    # 매일 UTC 01:00 (한국시간 오전 10:00)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 수동 실행 가능 (Actions 탭 → Run workflow)

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch scores from APIs
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-scores.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/scores.json
          if git diff --cached --quiet; then
            echo "변경사항 없음 - 커밋 건너뜀"
          else
            git commit -m "chore: update AI tool scores [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
