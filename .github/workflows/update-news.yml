name: Update News

on:
  schedule:
    # 매일 KST 00:00 / 06:00 / 12:00 / 18:00 (6시간마다)
    - cron: '0 15 * * *'   # KST 00:00
    - cron: '0 21 * * *'   # KST 06:00
    - cron: '0 3 * * *'    # KST 12:00
    - cron: '0 9 * * *'    # KST 18:00
  workflow_dispatch:
    # 수동 실행 가능 (Actions 탭 → Run workflow)

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news from Naver
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node scripts/fetch-news.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news.json
          if git diff --cached --quiet; then
            echo "변경사항 없음 - 커밋 건너뜀"
          else
            git commit -m "chore: update news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
