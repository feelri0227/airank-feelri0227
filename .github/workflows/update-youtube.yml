name: Update YouTube Videos

on:
  schedule:
    # 매주 월요일 UTC 20:00 (한국시간 화요일 05:00)
    - cron: '0 20 * * 1'
  workflow_dispatch:
    # 수동 실행 가능 (Actions 탭 → Run workflow)

permissions:
  contents: write

jobs:
  update-youtube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch YouTube videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-youtube.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/youtube-videos.json
          if git diff --cached --quiet; then
            echo "변경사항 없음 - 커밋 건너뜀"
          else
            git commit -m "chore: update youtube videos [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
